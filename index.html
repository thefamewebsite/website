<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>FAME HUB | Clean & Smooth</title>
<style>
/* ----- RESET & BASE ----- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  font-family: 'Inter', 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #f0f0f0;
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ----- FONDO ORIGI ----- */
.background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
  overflow: hidden;
}

.background img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.45) contrast(1.2) saturate(1.1);
  transform: scale(1.02);
  transition: transform 0.3s ease;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
  z-index: -1;
  pointer-events: none;
}

/* ----- SCROLLBAR ----- */
::-webkit-scrollbar {
  width: 8px;
  background: #14141c;
}
::-webkit-scrollbar-track {
  background: #14141c;
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: #3a3a4a;
  border-radius: 10px;
  transition: background 0.2s ease;
}
::-webkit-scrollbar-thumb:hover {
  background: #c79b42;
}

/* ----- HEADER ----- */
header {
  width: 100%;
  padding: 20px 40px;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10, 10, 15, 0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(199, 155, 66, 0.2);
  transition: all 0.3s ease;
}

.logo-container {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo {
  width: 48px;
  height: 48px;
  border-radius: 16px;
  object-fit: cover;
  border: 1px solid rgba(199, 155, 66, 0.3);
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
}
.logo:hover {
  transform: scale(1.03);
  border-color: #c79b42;
  box-shadow: 0 8px 25px rgba(199, 155, 66, 0.2);
}

.brand-text {
  font-family: 'Syne', 'Inter', sans-serif;
  font-size: 1.7rem;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #f5e6c4, #e5b55c, #c79b42);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.discord-link {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(114, 137, 218, 0.08);
  transition: all 0.3s ease;
  border: 1px solid rgba(114, 137, 218, 0.2);
}
.discord-link i {
  font-size: 28px;
  color: #8a9cf0;
  transition: transform 0.2s ease;
}
.discord-link:hover {
  background: rgba(114, 137, 218, 0.2);
  transform: scale(1.05);
  border-color: #7289da;
}
.discord-link:hover i {
  transform: rotate(5deg);
  color: #b9c4ff;
}

/* ----- MAIN CONTENT ----- */
.main-content {
  padding-top: 120px;
  padding-bottom: 80px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 2;
}

/* HERO */
.hero-section {
  text-align: center;
  margin-bottom: 70px;
  padding: 0 24px;
  width: 100%;
  max-width: 900px;
}

.welcome {
  font-size: clamp(1.8rem, 6vw, 3rem);
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #c79b42;
  opacity: 0.9;
  margin-bottom: 12px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.hub-title {
  font-size: clamp(3rem, 12vw, 6rem);
  font-weight: 800;
  font-family: 'Syne', sans-serif;
  letter-spacing: 8px;
  text-transform: uppercase;
  background: linear-gradient(135deg, #e5b55c, #f3d48f, #c79b42);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
}

/* CATEGORy */
.categories-container {
  display: flex;
  flex-direction: column;
  gap: 48px;
  width: 100%;
  max-width: 1300px;
  padding: 20px 32px;
  margin: 0 auto;
}

.category-section {
  width: 100%;
  background: rgba(18, 18, 26, 0.6);
  backdrop-filter: blur(8px);
  border-radius: 48px;
  padding: 32px 36px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
}

.category-section:hover {
  transform: translateY(-5px);
  border-color: rgba(199, 155, 66, 0.3);
  background: rgba(22, 22, 32, 0.7);
  box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
}

.category-header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 32px;
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.category-icon {
  width: 64px;
  height: 64px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  transition: all 0.2s ease;
  background: rgba(0,0,0,0.4);
}

.games-icon {
  background: linear-gradient(145deg, #e74c3c, #c0392b);
  box-shadow: 0 8px 18px rgba(231, 76, 60, 0.2);
}

.scripts-icon {
  background: linear-gradient(145deg, #6c5ce7, #4a3db5);
  box-shadow: 0 8px 18px rgba(108, 92, 231, 0.2);
}

.category-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 700;
  letter-spacing: 2px;
  color: #fff;
}

.games-title {
  background: linear-gradient(145deg, #ff8a6f, #e74c3c);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.scripts-title {
  background: linear-gradient(145deg, #9b8cff, #6c5ce7);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* GRILLA */
.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 28px;
  width: 100%;
}

.item-card {
  background: rgba(12, 12, 18, 0.65);
  backdrop-filter: blur(4px);
  border-radius: 32px;
  padding: 28px 18px;
  text-align: center;
  text-decoration: none;
  color: #f2f2f2;
  border: 1px solid rgba(255, 255, 255, 0.04);
  transition: all 0.35s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  cursor: pointer;
}

.item-card:hover {
  transform: translateY(-8px) scale(1.02);
  background: rgba(28, 28, 38, 0.85);
  border-color: rgba(199, 155, 66, 0.5);
  box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
}

.game-item:hover {
  border-color: #e74c3c;
  box-shadow: 0 20px 35px rgba(231, 76, 60, 0.15);
}
.script-item:hover {
  border-color: #6c5ce7;
  box-shadow: 0 20px 35px rgba(108, 92, 231, 0.15);
}

.item-icon {
  width: 80px;
  height: 80px;
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  transition: transform 0.25s ease;
  background: rgba(0, 0, 0, 0.4);
  margin-bottom: 8px;
}

.game-item .item-icon {
  background: linear-gradient(145deg, rgba(231, 76, 60, 0.7), rgba(192, 57, 43, 0.8));
  box-shadow: 0 8px 16px rgba(231, 76, 60, 0.2);
}
.script-item .item-icon {
  background: linear-gradient(145deg, rgba(108, 92, 231, 0.7), rgba(74, 61, 181, 0.8));
  box-shadow: 0 8px 16px rgba(108, 92, 231, 0.2);
}

.item-card:hover .item-icon {
  transform: scale(1.05);
}

.item-title {
  font-weight: 700;
  font-size: 1.25rem;
  letter-spacing: 0.5px;
  background: linear-gradient(135deg, #fff, #e0e0e0);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.item-badge {
  font-size: 0.75rem;
  padding: 6px 16px;
  border-radius: 60px;
  background: rgba(0, 0, 0, 0.45);
  color: #ccc;
  border: 1px solid rgba(255, 215, 0, 0.25);
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}

.item-card:hover .item-badge {
  background: rgba(199, 155, 66, 0.15);
  border-color: #c79b42;
  color: #ffe5b4;
}

/* COUNTER MINIMAL */
.counter {
  position: fixed;
  bottom: 24px;
  right: 28px;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.7);
  z-index: 3;
  backdrop-filter: blur(10px);
  background: rgba(0, 0, 0, 0.35);
  padding: 8px 18px;
  border-radius: 40px;
  border: 1px solid rgba(199, 155, 66, 0.3);
  letter-spacing: 0.8px;
  font-family: monospace;
  transition: all 0.2s;
}

/* ANIM */
@keyframes gentleFadeUp {
  0% {
    opacity: 0;
    transform: translateY(20px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

.hero-section, .category-section {
  animation: gentleFadeUp 0.7s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
}

.category-section:nth-child(2) {
  animation-delay: 0.1s;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  header {
    padding: 16px 28px;
  }
  .brand-text {
    font-size: 1.3rem;
  }
  .logo {
    width: 42px;
    height: 42px;
  }
  .categories-container {
    padding: 16px 24px;
    gap: 36px;
  }
  .category-section {
    padding: 26px 24px;
    border-radius: 40px;
  }
  .items-grid {
    gap: 20px;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  }
  .item-icon {
    width: 70px;
    height: 70px;
    font-size: 30px;
  }
}

@media (max-width: 600px) {
  .main-content {
    padding-top: 110px;
  }
  .hero-section {
    margin-bottom: 40px;
  }
  .categories-container {
    padding: 12px 20px;
  }
  .category-section {
    padding: 24px 18px;
  }
  .category-header {
    gap: 14px;
    margin-bottom: 24px;
  }
  .category-icon {
    width: 54px;
    height: 54px;
    font-size: 26px;
  }
  .items-grid {
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .item-card {
    padding: 20px 10px;
  }
  .item-title {
    font-size: 1rem;
  }
  .item-icon {
    width: 64px;
    height: 64px;
    font-size: 28px;
  }
  .brand-text {
    font-size: 1.1rem;
    letter-spacing: 1px;
  }
  .counter {
    bottom: 18px;
    right: 18px;
    font-size: 11px;
    padding: 6px 14px;
  }
}

@media (max-width: 480px) {
  .items-grid {
    grid-template-columns: 1fr;
    max-width: 280px;
    margin: 0 auto;
  }
  .category-header {
    flex-direction: column;
    text-align: center;
  }
  .welcome {
    letter-spacing: 3px;
  }
  .hub-title {
    letter-spacing: 4px;
  }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<!-- background -->
<div class="background">
  <img src="https://i.pinimg.com/originals/02/39/51/02395184cfd94e08cdb2c89f8de08756.gif" alt="Background">
</div>
<div class="overlay"></div>

<!-- HEADER -->
<header>
  <div class="logo-container">
    <img src="https://i.pinimg.com/736x/2d/15/09/2d15096a992665130f8bd2a2920a3d62.jpg" alt="Fame Logo" class="logo" />
    <span class="brand-text">THE FAME PORTAL</span>
  </div>
  <a href="https://discord.gg/ugg6MqEQTa" target="_blank" rel="noopener noreferrer" class="discord-link" aria-label="Discord">
    <i class="fab fa-discord"></i>
  </a>
</header>

<main class="main-content">
  <div class="hero-section">
    <div class="welcome">✦ TRUE WEBSITE ✦</div>
    <div class="hub-title">FAME HUB</div>
  </div>

  <div class="categories-container">
    <!-- GAMES -->
    <div class="category-section games">
      <div class="category-header">
        <div class="category-icon games-icon">
          <i class="fas fa-gamepad"></i>
        </div>
        <div class="category-title games-title">GAMES</div>
      </div>
      <div class="items-grid">
        <a href="https://www.roblox.com/games/85026996387055/DEE-DEE" target="_blank" rel="noopener noreferrer" class="item-card game-item">
          <div class="item-icon">
            <i class="fas fa-crown"></i>
          </div>
          <span class="item-title">DEE HOOD</span>
          <span class="item-badge">PLAY NOW</span>
        </a>
        <a href="https://www.roblox.com/games/119400300196930/DOULE-HOOD" target="_blank" rel="noopener noreferrer" class="item-card game-item">
          <div class="item-icon">
            <i class="fas fa-skull"></i>
          </div>
          <span class="item-title">DOULE HOOD | DISCONTINUED</span>
          <span class="item-badge">PLAY NOW</span>
        </a>
      </div>
   </div>

    <!-- SCRIPTS -->
    <div class="category-section scripts">
      <div class="category-header">
        <div class="category-icon scripts-icon">
          <i class="fas fa-code"></i>
        </div>
        <div class="category-title scripts-title">SCRIPTS</div>
      </div>
      <div class="items-grid">
        <a href="https://pastebin.com/2kuvH9SR" target="_blank" rel="noopener noreferrer" class="item-card script-item">
          <div class="item-icon">
            <i class="fas fa-terminal"></i>
          </div>
          <span class="item-title">EMOTE GUI | KEYLESS</span>
          <span class="item-badge">v2.1.0</span>
        </a>
        <a href="https://pastebin.com/CN0cNLMd" target="_blank" rel="noopener noreferrer" class="item-card script-item">
          <div class="item-icon">
            <i class="fas fa-shield-alt"></i>
          </div>
          <span class="item-title">TRIGGERBOT | KEYLESS</span>
          <span class="item-badge">v5.2.3</span>
        </a>
      </div>
    </div>
  </div>
</main>

<div class="counter">
  <span>✦ COMMUNITY ACTIVE ✦</span>
</div>

<script>
  (function() {
    // Animación de entrada suave
    const sections = document.querySelectorAll('.category-section, .hero-section');
    sections.forEach((el, idx) => {
      el.style.opacity = '0';
      el.style.animation = 'none';
      setTimeout(() => {
        el.style.opacity = '1';
        el.style.animation = 'gentleFadeUp 0.65s ease forwards';
      }, idx * 80);
    });

    // Contador dinámico sutil
    let activeUsers = 48;
    const counterSpan = document.querySelector('.counter span');
    if (counterSpan) {
      counterSpan.innerHTML = `✦ 30 ACTIVE ✦`;
      setInterval(() => {
        let variation = Math.floor(Math.random() * 7) - 2;
        let newVal = activeUsers + variation;
        if (newVal < 10) newVal = 22;
        if (newVal > 24) newVal = 26;
        activeUsers = newVal;
        counterSpan.innerHTML = `✦ ${activeUsers} ACTIVE ✦`;
      }, 14000);
    }

    // Header scroll effect
    let lastScroll = 0;
    const header = document.querySelector('header');
    window.addEventListener('scroll', () => {
      const currentScroll = window.pageYOffset;
      if (currentScroll > 80 && lastScroll <= 80) {
        header.style.background = 'rgba(8, 8, 12, 0.85)';
        header.style.backdropFilter = 'blur(14px)';
      } else if (currentScroll <= 80 && lastScroll > 80) {
        header.style.background = 'rgba(10, 10, 15, 0.75)';
        header.style.backdropFilter = 'blur(12px)';
      }
      lastScroll = currentScroll;
    });
  })();
</script>
</body>
</html>
