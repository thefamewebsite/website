<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WEBSITE | FAME HUB</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap');
@import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css');

:root {
  --primary: #c79b42;
  --primary-light: #e5b55c;
  --primary-dark: #a87d32;
  --primary-glow: rgba(199, 155, 66, 0.6);
  --secondary: #1a1f2e;
  --accent: #ffd966;
  --dark: #0b0d14;
  --darker: #030405;
  --glass: rgba(255, 255, 255, 0.02);
  --glass-border: rgba(255, 215, 0, 0.2);
  --script-color: #6c5ce7;
  --script-light: #8b7cf0;
  --script-dark: #5649c0;
  --script-glow: rgba(108, 92, 231, 0.6);
  --game-color: #e74c3c;
  --game-light: #ff6b5b;
  --game-dark: #c0392b;
  --game-glow: rgba(231, 76, 60, 0.6);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  font-family: 'Plus Jakarta Sans', 'Space Grotesk', sans-serif;
  color: white;
  overflow-x: hidden;
  overflow-y: auto;
  position: relative;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

/* ===== SCROLLBAR ÉPICA MEJORADA ===== */
::-webkit-scrollbar {
  width: 12px;
  background: var(--darker);
}

::-webkit-scrollbar-track {
  background: linear-gradient(180deg, 
    rgba(199, 155, 66, 0.05) 0%, 
    rgba(108, 92, 231, 0.05) 50%,
    rgba(231, 76, 60, 0.05) 100%);
  border-left: 1px solid rgba(199, 155, 66, 0.1);
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(135deg, 
    var(--primary) 0%, 
    var(--script-color) 50%, 
    var(--game-color) 100%);
  border-radius: 20px;
  border: 2px solid var(--darker);
  box-shadow: 
    0 0 15px var(--primary-glow),
    inset 0 0 5px rgba(255, 255, 255, 0.5);
  transition: all 0.3s ease;
}

::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(135deg, 
    var(--primary-light) 0%, 
    var(--script-light) 50%, 
    var(--game-light) 100%);
  box-shadow: 
    0 0 25px var(--primary),
    inset 0 0 8px rgba(255, 255, 255, 0.8);
  transform: scaleX(1.1);
}

::-webkit-scrollbar-thumb:active {
  transform: scaleX(1.2);
}

::-webkit-scrollbar-corner {
  background: transparent;
}

/* Firefox scrollbar */
* {
  scrollbar-width: thin;
  scrollbar-color: var(--primary) var(--darker);
}

.background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
}

.background img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.3) contrast(1.4) saturate(1.5) blur(1px);
  animation: slowZoom 50s infinite alternate ease-in-out;
}

@keyframes slowZoom {
  0% { transform: scale(1); }
  100% { transform: scale(1.2); }
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.98) 100%);
  z-index: -1;
}

.overlay::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    repeating-linear-gradient(45deg, 
      rgba(199, 155, 66, 0.02) 0px, 
      rgba(199, 155, 66, 0.02) 2px,
      transparent 2px, 
      transparent 8px),
    radial-gradient(circle at 30% 50%, rgba(108, 92, 231, 0.03) 0%, transparent 50%),
    radial-gradient(circle at 70% 50%, rgba(231, 76, 60, 0.03) 0%, transparent 50%);
  animation: overlayShift 20s infinite alternate;
  z-index: -1;
}

@keyframes overlayShift {
  0% { opacity: 0.3; background-position: 0% 0%; }
  100% { opacity: 0.6; background-position: 100% 100%; }
}

header {
  width: 100%;
  padding: 18px 35px;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(3, 4, 5, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(199, 155, 66, 0.25);
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
}

.logo-container {
  display: flex;
  align-items: center;
  gap: 18px;
  position: relative;
}

.logo {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  object-fit: cover;
  border: 2px solid transparent;
  background: linear-gradient(135deg, var(--primary), var(--script-color)) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  filter: drop-shadow(0 0 20px var(--primary-glow));
  animation: logoFloat 4s infinite ease-in-out;
}

@keyframes logoFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-5px) rotate(2deg); }
}

.logo:hover {
  transform: scale(1.2) rotate(10deg);
  filter: drop-shadow(0 0 35px var(--primary));
  border-color: var(--primary-light);
}

.brand-text {
  font-family: 'Syne', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, 
    #fff 0%, 
    var(--primary-light) 30%, 
    var(--script-light) 70%, 
    #fff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
  letter-spacing: 3px;
  position: relative;
  text-shadow: 0 0 30px rgba(199, 155, 66, 0.3);
}

.brand-text::before {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 0;
  width: 0;
  height: 3px;
  background: linear-gradient(90deg, 
    var(--primary), 
    var(--script-color), 
    var(--game-color), 
    transparent);
  transition: width 0.4s ease;
  border-radius: 3px;
}

.logo-container:hover .brand-text::before {
  width: 100%;
}

.discord-link {
  position: relative;
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(114, 137, 218, 0.1);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  border: 1px solid rgba(114, 137, 218, 0.2);
}

.discord-link i {
  font-size: 32px;
  color: #7289da;
  filter: drop-shadow(0 0 12px rgba(114, 137, 218, 0.6));
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.discord-link:hover {
  background: rgba(114, 137, 218, 0.2);
  transform: scale(1.15);
  border-color: rgba(114, 137, 218, 0.4);
  box-shadow: 0 0 30px rgba(114, 137, 218, 0.3);
}

.discord-link:hover i {
  transform: rotate(360deg) scale(1.2);
  filter: drop-shadow(0 0 25px #7289da);
  color: #9fb0ff;
}

.main-content {
  padding-top: 100px;
  padding-bottom: 50px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 2;
}

.hero-section {
  text-align: center;
  margin-bottom: 60px;
  padding: 0 20px;
  width: 100%;
  position: relative;
}

.hero-section::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 150%;
  height: 150%;
  background: radial-gradient(circle, 
    rgba(199,155,66,0.15) 0%, 
    rgba(108,92,231,0.15) 30%, 
    rgba(231,76,60,0.15) 60%, 
    transparent 80%);
  filter: blur(60px);
  z-index: -1;
  animation: heroGlow 8s infinite alternate;
}

@keyframes heroGlow {
  0% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.2); }
}

.welcome {
  font-size: clamp(2.2rem, 9vw, 5rem);
  font-weight: 800;
  font-family: 'Syne', sans-serif;
  line-height: 1.1;
  letter-spacing: clamp(4px, 2vw, 10px);
  text-transform: uppercase;
  color: transparent;
  -webkit-text-stroke: 2px var(--primary);
  text-stroke: 2px var(--primary);
  animation: glitch 5s infinite;
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(30px);
  animation: fadeInUp 0.8s forwards, glitch 5s infinite 0.8s;
  text-shadow: 0 0 20px rgba(199, 155, 66, 0.3);
}

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes glitch {
  0%, 100% { transform: skew(0deg); text-shadow: -2px 0 var(--primary), 2px 0 var(--primary); }
  95% { transform: skew(0deg); }
  96% { transform: skew(8deg); text-shadow: -4px 2px var(--script-color), 4px -2px var(--game-color); }
  97% { transform: skew(-8deg); text-shadow: 4px -2px var(--script-color), -4px 2px var(--game-color); }
  98% { transform: skew(4deg); }
  99% { transform: skew(-4deg); }
}

.hub-title {
  font-size: clamp(3rem, 14vw, 7rem);
  font-weight: 800;
  font-family: 'Syne', sans-serif;
  letter-spacing: clamp(5px, 2.5vw, 15px);
  text-transform: uppercase;
  background: linear-gradient(135deg, 
    var(--primary) 0%, 
    var(--accent) 30%, 
    var(--script-light) 70%, 
    #fff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 20px 0 30px;
  animation: shine 3s infinite, fadeInScale 0.8s 0.2s forwards;
  line-height: 1.2;
  opacity: 0;
  transform: scale(0.9);
  filter: drop-shadow(0 0 30px var(--primary-glow));
}

@keyframes fadeInScale {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes shine {
  0%, 100% { 
    filter: brightness(1) drop-shadow(0 0 20px var(--primary-glow)); 
    background-position: 0% 50%;
  }
  50% { 
    filter: brightness(1.4) drop-shadow(0 0 40px var(--primary)); 
    background-position: 100% 50%;
  }
}

.categories-container {
  display: flex;
  flex-direction: column;
  gap: 60px;
  width: 100%;
  max-width: 1400px;
  padding: 20px 30px;
  margin: 0 auto;
}

.category-section {
  width: 100%;
  background: rgba(3, 4, 5, 0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 50px;
  padding: 35px 30px;
  border: 1px solid rgba(255, 255, 255, 0.02);
  box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
}

.category-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, 
    transparent, 
    rgba(255, 255, 255, 0.02), 
    rgba(199, 155, 66, 0.02), 
    transparent);
  transition: left 1s ease;
}

.category-section:hover::before {
  left: 100%;
}

.category-section:hover {
  transform: translateY(-10px) scale(1.02);
  border-color: rgba(199, 155, 66, 0.3);
  box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
}

.category-section.games:hover {
  box-shadow: 0 50px 100px rgba(231, 76, 60, 0.25);
}

.category-section.scripts:hover {
  box-shadow: 0 50px 100px rgba(108, 92, 231, 0.25);
}

.category-header {
  display: flex;
  align-items: center;
  gap: 25px;
  margin-bottom: 35px;
  padding-bottom: 25px;
  border-bottom: 2px solid rgba(255, 255, 255, 0.03);
  position: relative;
}

.category-icon {
  width: 70px;
  height: 70px;
  border-radius: 25px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  transition: all 0.4s ease;
  animation: iconPulse 4s infinite ease-in-out;
  position: relative;
}

.category-icon::after {
  content: '';
  position: absolute;
  top: -5px;
  left: -5px;
  right: -5px;
  bottom: -5px;
  border-radius: 30px;
  background: inherit;
  filter: blur(20px);
  opacity: 0.3;
  z-index: -1;
  transition: opacity 0.3s ease;
}

.category-section:hover .category-icon::after {
  opacity: 0.6;
}

@keyframes iconPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.games-icon {
  background: linear-gradient(135deg, var(--game-color), var(--game-dark));
  box-shadow: 0 0 40px var(--game-glow);
}

.scripts-icon {
  background: linear-gradient(135deg, var(--script-color), var(--script-dark));
  box-shadow: 0 0 40px var(--script-glow);
}

.category-section:hover .category-icon {
  transform: scale(1.15) rotate(8deg);
}

.category-title {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.2rem, 7vw, 3.5rem);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 4px;
  position: relative;
}

.games-title {
  background: linear-gradient(135deg, 
    var(--game-light), 
    var(--game-color), 
    var(--game-dark), 
    var(--game-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 300% 300%;
  animation: gradientShift 6s infinite;
}

.scripts-title {
  background: linear-gradient(135deg, 
    var(--script-light), 
    var(--script-color), 
    var(--script-dark), 
    var(--script-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 300% 300%;
  animation: gradientShift 6s infinite;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 25px;
  width: 100%;
}

.item-card {
  background: rgba(255, 255, 255, 0.01);
  border-radius: 30px;
  padding: 25px 15px;
  text-align: center;
  text-decoration: none;
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.01);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  position: relative;
  overflow: hidden;
}

.item-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 0%, 
    rgba(255, 255, 255, 0.1), 
    transparent 70%);
  opacity: 0;
  transition: opacity 0.4s ease;
}

.item-card::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(
    transparent,
    rgba(199, 155, 66, 0.1),
    transparent 30%
  );
  animation: rotate 8s linear infinite;
  opacity: 0;
  transition: opacity 0.4s ease;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.item-card:hover::before {
  opacity: 1;
}

.item-card:hover::after {
  opacity: 0.5;
}

.item-card:hover {
  transform: translateY(-15px) scale(1.08);
  border-color: var(--primary);
  background: rgba(255, 255, 255, 0.03);
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
}

.game-item:hover {
  box-shadow: 0 30px 60px rgba(231, 76, 60, 0.3);
  border-color: var(--game-color);
}

.script-item:hover {
  box-shadow: 0 30px 60px rgba(108, 92, 231, 0.3);
  border-color: var(--script-color);
}

.item-icon {
  width: 85px;
  height: 85px;
  border-radius: 25px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin-bottom: 10px;
  transition: all 0.4s ease;
  position: relative;
  z-index: 1;
}

.item-icon::after {
  content: '';
  position: absolute;
  top: -5px;
  left: -5px;
  right: -5px;
  bottom: -5px;
  border-radius: 30px;
  background: inherit;
  filter: blur(20px);
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: -1;
}

.item-card:hover .item-icon::after {
  opacity: 0.7;
}

.game-item .item-icon {
  background: linear-gradient(135deg, var(--game-light), var(--game-dark));
  box-shadow: 0 10px 25px rgba(231, 76, 60, 0.4);
}

.script-item .item-icon {
  background: linear-gradient(135deg, var(--script-light), var(--script-dark));
  box-shadow: 0 10px 25px rgba(108, 92, 231, 0.4);
}

.item-card:hover .item-icon {
  transform: scale(1.15) rotate(8deg);
}

.item-title {
  font-weight: 700;
  font-size: 1.2rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #fff, #e0e0e0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  position: relative;
  z-index: 1;
}

.item-badge {
  font-size: 0.8rem;
  padding: 5px 15px;
  border-radius: 40px;
  background: rgba(0, 0, 0, 0.3);
  color: rgba(255, 255, 255, 0.9);
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  font-weight: 600;
  letter-spacing: 1px;
  transition: all 0.3s ease;
  position: relative;
  z-index: 1;
}

.item-card:hover .item-badge {
  background: rgba(255, 255, 255, 0.1);
  border-color: var(--primary);
  color: white;
  transform: scale(1.05);
}

.floating-elements {
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.floating-symbol {
  position: absolute;
  font-size: 50px;
  color: rgba(199, 155, 66, 0.03);
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  animation: floatAround 40s infinite linear;
  text-shadow: 0 0 30px rgba(199, 155, 66, 0.2);
  white-space: nowrap;
}

@keyframes floatAround {
  0% { 
    transform: translateY(100vh) rotate(0deg) scale(0.5); 
    opacity: 0;
  }
  10% { opacity: 0.2; }
  90% { opacity: 0.2; }
  100% { 
    transform: translateY(-100vh) rotate(1080deg) scale(2); 
    opacity: 0;
  }
}

.counter {
  position: fixed;
  bottom: 30px;
  right: 30px;
  font-size: 14px;
  color: rgba(255, 255, 255, 0.9);
  z-index: 3;
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  padding: 10px 25px;
  border-radius: 50px;
  border: 1px solid rgba(199, 155, 66, 0.4);
  background: rgba(0, 0, 0, 0.2);
  letter-spacing: 1.5px;
  font-weight: 600;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  animation: counterGlow 3s infinite;
}

@keyframes counterGlow {
  0%, 100% { 
    border-color: rgba(199, 155, 66, 0.4);
    box-shadow: 0 0 20px rgba(199, 155, 66, 0.2);
  }
  50% { 
    border-color: rgba(199, 155, 66, 0.8);
    box-shadow: 0 0 30px rgba(199, 155, 66, 0.4);
  }
}

/* Media Queries */
@media (max-width: 1024px) {
  .items-grid {
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 20px;
  }
  
  .item-icon {
    width: 75px;
    height: 75px;
    font-size: 32px;
  }
}

@media (max-width: 768px) {
  header {
    padding: 15px 25px;
  }
  
  .brand-text {
    font-size: 1.5rem;
    letter-spacing: 2px;
  }
  
  .logo {
    width: 42px;
    height: 42px;
  }
  
  .discord-link {
    width: 46px;
    height: 46px;
  }
  
  .discord-link i {
    font-size: 28px;
  }
  
  .main-content {
    padding-top: 90px;
  }
  
  .categories-container {
    padding: 15px 20px;
    gap: 40px;
  }
  
  .category-section {
    padding: 30px 25px;
  }
  
  .category-header {
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .category-icon {
    width: 60px;
    height: 60px;
    font-size: 28px;
  }
  
  .items-grid {
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
  }
  
  .item-card {
    padding: 20px 12px;
  }
  
  .item-icon {
    width: 70px;
    height: 70px;
    font-size: 30px;
  }
  
  .item-title {
    font-size: 1.1rem;
  }
}

@media (max-width: 480px) {
  .welcome {
    -webkit-text-stroke: 1px var(--primary);
  }
  
  .categories-container {
    padding: 12px 15px;
  }
  
  .category-section {
    padding: 25px 20px;
    border-radius: 40px;
  }
  
  .items-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  
  .item-card {
    padding: 18px 8px;
  }
  
  .item-icon {
    width: 60px;
    height: 60px;
    font-size: 26px;
  }
  
  .item-title {
    font-size: 0.95rem;
  }
  
  .item-badge {
    font-size: 0.7rem;
    padding: 4px 10px;
  }
  
  .counter {
    bottom: 15px;
    right: 15px;
    font-size: 12px;
    padding: 8px 18px;
  }
  
  .floating-symbol {
    font-size: 40px;
  }
}

@media (max-width: 360px) {
  .items-grid {
    grid-template-columns: 1fr;
  }
  
  .category-header {
    flex-direction: column;
    text-align: center;
  }
  
  .item-card {
    max-width: 280px;
    margin: 0 auto;
  }
  
  .brand-text {
    font-size: 1.2rem;
  }
}

.loading-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 4px;
  background: linear-gradient(90deg, 
    var(--primary), 
    var(--script-color), 
    var(--game-color), 
    var(--primary));
  background-size: 300% 100%;
  z-index: 9999;
  animation: loading 1.8s ease, gradientMove 1.8s linear infinite;
  box-shadow: 0 0 20px var(--primary);
}

@keyframes loading {
  0% { width: 0; }
  100% { width: 100%; }
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
</style>
</head>
<body>
  <div class="loading-bar"></div>

  <div class="floating-elements">
    <div class="floating-symbol" style="left: 5%; animation-duration: 25s;">✦</div>
    <div class="floating-symbol" style="left: 15%; animation-duration: 30s;">⚡</div>
    <div class="floating-symbol" style="left: 25%; animation-duration: 28s;">⬩</div>
    <div class="floating-symbol" style="left: 35%; animation-duration: 32s;">◈</div>
    <div class="floating-symbol" style="left: 45%; animation-duration: 26s;">⬫</div>
    <div class="floating-symbol" style="left: 55%; animation-duration: 29s;">✦</div>
    <div class="floating-symbol" style="left: 65%; animation-duration: 27s;">⚡</div>
    <div class="floating-symbol" style="left: 75%; animation-duration: 31s;">⬩</div>
    <div class="floating-symbol" style="left: 85%; animation-duration: 24s;">◈</div>
    <div class="floating-symbol" style="left: 95%; animation-duration: 33s;">⬫</div>
  </div>

  <header>
    <div class="logo-container">
      <img src="https://i.pinimg.com/736x/2d/15/09/2d15096a992665130f8bd2a2920a3d62.jpg" alt="Logo" class="logo" />
      <span class="brand-text">GAMES & SCRIPTS</span>
    </div>
    <a href="https://discord.gg/ugg6MqEQTa" target="_blank" rel="noopener noreferrer" class="discord-link" aria-label="Discord">
      <i class="fab fa-discord"></i>
    </a>
  </header>

  <div class="main-content">
    <div class="hero-section">
      <div class="welcome">TRUE!</div>
      <div class="hub-title">FAME HUB</div>
    </div>

    <div class="categories-container">
      <!-- GAMES CATEGORY -->
      <div class="category-section games">
        <div class="category-header">
          <div class="category-icon games-icon">
            <i class="fas fa-gamepad"></i>
          </div>
          <div class="category-title games-title">GAMES</div>
        </div>
        
        <div class="items-grid">
          <a href="https://www.roblox.com/games/119400300196930/DOULE-HOOD" target="_blank" class="item-card game-item">
            <div class="item-icon">
              <i class="fas fa-crown"></i>
            </div>
            <span class="item-title">DOULE HOOD</span>
            <span class="item-badge">PLAY NOW</span>
          </a>
          
          <a href="https://guns.lol/saxrifice" target="_blank" class="item-card game-item">
            <div class="item-icon">
              <i class="fas fa-skull"></i>
            </div>
            <span class="item-title">?????</span>
            <span class="item-badge">COMING SOON</span>
          </a>
        </div>
      </div>

      <!-- SCRIPTS CATEGORY -->
      <div class="category-section scripts">
        <div class="category-header">
          <div class="category-icon scripts-icon">
            <i class="fas fa-code"></i>
          </div>
          <div class="category-title scripts-title">SCRIPTS</div>
        </div>
        
        <div class="items-grid">
          <a href="https://pastebin.com/2kuvH9SR" target="_blank" class="item-card script-item">
            <div class="item-icon">
              <i class="fas fa-terminal"></i>
            </div>
            <span class="item-title">EMOTE GUI</span>
            <span class="item-badge">v2.1.0</span>
          </a>
          
          <a href="https://pastebin.com/CN0cNLMd" target="_blank" class="item-card script-item">
            <div class="item-icon">
              <i class="fas fa-shield"></i>
            </div>
            <span class="item-title">TRIGGERBOT | KEY</span>
            <span class="item-badge">v1.0.0</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="counter">
    <span>✦ ONLINE: 11 ✦</span>
  </div>

  <script>
  // Smooth entry animations
  document.addEventListener('DOMContentLoaded', () => {
    const elements = document.querySelectorAll('.category-section, .hero-section');
    elements.forEach((el, index) => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(40px)';
      
      setTimeout(() => {
        el.style.transition = 'all 0.9s cubic-bezier(0.34, 1.56, 0.64, 1)';
        el.style.opacity = '1';
        el.style.transform = 'translateY(0)';
      }, 200 + (index * 250));
    });

    // Loading bar fade out
    setTimeout(() => {
      document.querySelector('.loading-bar').style.opacity = '0';
    }, 1800);
  });

  // Enhanced parallax (desktop only)
  if (window.innerWidth > 768) {
    let mouseX = 0, mouseY = 0;
    let currentX = 0, currentY = 0;
    
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5) * 40;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 40;
    });
    
    function animateParallax() {
      currentX += (mouseX - currentX) * 0.05;
      currentY += (mouseY - currentY) * 0.05;
      
      const background = document.querySelector('.background img');
      background.style.transform = `scale(1.2) translate(${currentX}px, ${currentY}px)`;
      
      const header = document.querySelector('header');
      header.style.transform = `translate(${currentX * 0.3}px, ${currentY * 0.3}px)`;
      
      requestAnimationFrame(animateParallax);
    }
    
    animateParallax();
  }


  let counter = 24;
  setInterval(() => {
    const counterElement = document.querySelector('.counter span');
    const change = Math.floor(Math.random() * 20) - 10;
    counter = Math.max(10, Math.min(13, counter + change));
    counterElement.textContent = `✦ ONLINE: ${counter} ✦`;
  }, 4000);


  const cards = document.querySelectorAll('.item-card');
  cards.forEach(card => {
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      
      const rotateX = (y - centerY) / 10;
      const rotateY = (centerX - x) / 10;
      
      card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-15px) scale(1.08)`;
    });
    
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  });
  </script>
